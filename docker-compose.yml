services:
    db:
        image: postgres:17
        container_name: gabaritol-postgres
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=password
            - POSTGRES_DB=springbootdb
        ports:
            - "5432:5432"

    app:
        build: .
        container_name: gabaritol-app
        depends_on:
            - db
        ports:
            - "8080:8080"
